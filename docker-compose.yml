version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: chat-archiver-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: chat-archiver-app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/chat-archiver
      - PORT=3000
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
