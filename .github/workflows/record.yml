name: 📺 YouTube チャット録画 & PDFレポート生成
run-name: "📺 録画: ${{ inputs.video_id }} (${{ inputs.timeout_minutes }}分)"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube動画ID (例: dQw4w9WgXcQ)'
        required: true
        type: string
      timeout_minutes:
        description: '最大録画時間（分）※GitHub Actionsの上限は360分'
        required: false
        default: '360'
        type: string

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: read

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      MONGODB_URI: mongodb://localhost:27017/chat-archiver
      PORT: 3000

    steps:
      - name: 📥 チェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存インストール
        run: npm ci

      - name: 🔤 日本語フォントダウンロード
        run: npx ts-node src/utils/fontDownloader.ts

      - name: 🎙️ スタンドアロン録画開始
        # 背景サーバーを使わず、一直線に録画・PDF生成まで実行
        run: |
          mkdir -p output
          npx ts-node src/standalone-recorder.ts \
            --video-id "${{ inputs.video_id }}" \
            --timeout "${{ inputs.timeout_minutes }}"
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          MONGODB_URI: mongodb://localhost:27017/chat-archiver

      - name: 📤 成果物アップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-report-${{ inputs.video_id }}
          path: output/
          retention-days: 1
