name: 📺 YouTube チャット録画 & PDFレポート生成

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: true
      timeout:
        description: '録画時間 (分)'
        default: '360'
  repository_dispatch:
    types: [youtube-stream-started]

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 380
    permissions:
      contents: write
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存関係をインストール
        run: |
          npm install
          # Puppeteer 用のブラウザ依存パッケージをインストール
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2

      - name: 🎙️ スタンドアロン録画開始
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          TIMEOUT: ${{ github.event.inputs.timeout || '360' }}
        run: |
          echo "🎬 Starting recording: $VIDEO_ID"
          npx ts-node src/standalone-recorder.ts --video-id $VIDEO_ID --timeout $TIMEOUT

      - name: 📤 GitHub Pages へデプロイ (最新レポート反映)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
