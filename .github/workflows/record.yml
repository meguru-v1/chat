name: 📺 YouTube チャット録画 & PDFレポート生成

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID'
        required: true
      timeout:
        description: '録画時間 (分)'
        default: '360'
  repository_dispatch:
    types: [youtube-stream-started]

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 380
    permissions:
      contents: write # 履歴ファイルの書き込みに必要
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存関係をインストール
        run: npm install

      - name: 🎙️ スタンドアロン録画開始 (No-DB Mode)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          TIMEOUT: ${{ github.event.inputs.timeout || github.event.client_payload.timeout || '360' }}
        run: |
          echo "🎬 Starting recording: \"$VIDEO_ID\""
          npx ts-node src/standalone-recorder.ts --video-id="$VIDEO_ID" --timeout="$TIMEOUT"

      - name: 📂 成果物をコミットして保存
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reports/*.pdf public/sessions.json
          git commit -m "chore: 録画レポートを追加 (${{ github.event.inputs.video_id || github.event.client_payload.video_id }})" || echo "No changes to commit"
          git push
