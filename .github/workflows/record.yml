name: 📺 YouTube チャット録画 & PDFレポート生成

# ✅ 安定性向上: run-name に video_title や video_id を明示し、監視エンジンの二重起動判定精度を向上
run-name: "🎙️ 録画中: ${{ github.event.client_payload.video_title || github.event.client_payload.video_id || github.event.inputs.video_id }} — ${{ github.event.client_payload.channel_name || '手動' }}"

concurrency:
  group: record-${{ github.event.client_payload.video_id || github.event.inputs.video_id || 'manual' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID (11文字)'
        required: true
      timeout:
        description: '録画時間 (分, 最大330)'
        default: '330'
  repository_dispatch:
    types: [youtube-stream-started]

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    # GitHub Actions の上限は6時間(360分)。PDF生成・push の余裕を30分確保。
    timeout-minutes: 370
    permissions:
      contents: write

    steps:
      - name: 💬 Discord に録画開始の通知を送信
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          VIDEO_TITLE: ${{ github.event.client_payload.video_title }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Webhookが設定されていない場合はスキップ
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "Webhook is not set. Skipping."; exit 0; fi
          
          # 手動トリガー等でタイトルが取得できていない場合、NoEmbed APIから取得を試みる
          FETCHED_TITLE="$VIDEO_TITLE"
          if [ -z "$FETCHED_TITLE" ]; then
            FETCHED_TITLE=$(curl -s "https://noembed.com/embed?url=https://www.youtube.com/watch?v=$VIDEO_ID" | jq -r '.title // empty')
          fi
          FINAL_TITLE="${FETCHED_TITLE:-$VIDEO_ID}"
          
          PAGES_URL="https://${REPO_NAME%%/*}.github.io/${REPO_NAME#*/}/"
          ICON_URL="${PAGES_URL}icons/icon.png"
          PAYLOAD=$(jq -n --arg username "Smart-Archiver" \
                           --arg avatar "$ICON_URL" \
                           --arg title "$FINAL_TITLE" \
                           --arg url "$PAGES_URL" \
                           '{username: $username, avatar_url: $avatar, content: "🔴 **録画開始**\n🎥 対象動画: **\($title)** の監視と録画プロセスを開始しました！\n🔗 [アプリを開いて進捗を確認する](\($url))"}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存関係をインストール
        run: npm install

      - name: 🎙️ スタンドアロン録画開始 (No-DB Mode)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # ✅ セキュリティ: 環境変数経由で渡すことでシェルインジェクションを防止
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          TIMEOUT: ${{ github.event.inputs.timeout || github.event.client_payload.timeout || '330' }}
        run: |
          echo "🎬 Starting recording: \"$VIDEO_ID\" (timeout: ${TIMEOUT}min)"
          npx ts-node src/standalone-recorder.ts --video-id="$VIDEO_ID" --timeout="$TIMEOUT"

      - name: 📂 成果物をコミットして保存
        # ✅ 最重要: if: always() により、録画が途中終了・強制終了された場合でも必ず実行する
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add public/reports/ public/sessions.json || true
          git commit -m "chore: 録画レポートを追加 (${{ github.event.inputs.video_id || github.event.client_payload.video_id }})" || echo "No changes to commit"
          
          # 複数タスクが同時完了した際の sessions.json 競合を防ぐためのリライループ
          for i in {1..5}; do
            git fetch origin main
            if git push; then
              echo "✅ Push successful!"
              exit 0
            fi
            
            echo "⚠️ Push failed due to conflict. Resolving sessions.json safely without rebase conflict..."
            OUR_SESSION=$(jq '.[0]' public/sessions.json)
            
            # softリセットでローカル変更(生成したPDFなど)は保持しつつHEADを最新に合わせる
            git reset --soft origin/main
            
            # sessions.jsonだけは最新のものを上書き取得し、再度jqで自分自身のレコードを先頭にねじ込む
            git checkout origin/main -- public/sessions.json
            jq --argjson newEntry "$OUR_SESSION" '[$newEntry] + .' public/sessions.json > tmp.json && mv tmp.json public/sessions.json
            
            git add public/reports/ public/sessions.json || true
            git commit -m "chore: 録画レポートを追加 (${{ github.event.inputs.video_id || github.event.client_payload.video_id }})" || true
            sleep $((RANDOM % 3 + 1))
          done

      - name: 💬 Discord に完了通知を送信
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          REPO_NAME: ${{ github.repository }}
          RECORD_MSG_COUNT: ${{ env.RECORD_MSG_COUNT }}
          RECORD_DURATION: ${{ env.RECORD_DURATION_MINS }}
          RECORD_REASON: ${{ env.RECORD_REASON }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "Webhook is not set. Skipping."; exit 0; fi
          PAGES_URL="https://${REPO_NAME%%/*}.github.io/${REPO_NAME#*/}/"
          ICON_URL="${PAGES_URL}icons/icon.png"
          
          # 終了理由からステータス表示を決定
          if [ "$RECORD_REASON" = "stream_ended" ] || [ "$RECORD_REASON" = "stream_ended_confirmed" ] || [ "$RECORD_REASON" = "test_run" ] || [ -z "$RECORD_REASON" ]; then
             STATUS_TITLE="✅ 録画完了"
             COLOR=3066993  # 緑色
          else
             STATUS_TITLE="⚠️ 録画異常終了"
             COLOR=15158332 # 赤色
          fi
          
          DESC="🎥 **対象動画:** ${VIDEO_TITLE:-$VIDEO_ID}"
          if [ -n "$RECORD_MSG_COUNT" ]; then
             DESC="$DESC\n📊 **取得コメント数:** ${RECORD_MSG_COUNT} 件"
          fi
          if [ -n "$RECORD_DURATION" ]; then
             DESC="$DESC\n⏱️ **録画時間:** ${RECORD_DURATION} 分"
          fi
          if [ -n "$RECORD_REASON" ] && [ "$STATUS_TITLE" = "⚠️ 録画異常終了" ]; then
             DESC="$DESC\nℹ️ **停止理由:** \`${RECORD_REASON}\`"
          fi
          DESC="$DESC\n\n🔗 **[ここをクリックしてレポートを確認]($PAGES_URL)**"
          
          THUMB_URL="https://img.youtube.com/vi/${VIDEO_ID}/maxresdefault.jpg"
          
          PAYLOAD=$(jq -n --arg username "Smart-Archiver" \
                           --arg avatar "$ICON_URL" \
                           --arg title "$STATUS_TITLE" \
                           --arg desc "$DESC" \
                           --arg thumb "$THUMB_URL" \
                           --argjson color "$COLOR" \
                           '{
                             username: $username,
                             avatar_url: $avatar,
                             embeds: [{
                               title: $title,
                               description: $desc,
                               color: $color,
                               image: { url: $thumb }
                             }]
                           }')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
