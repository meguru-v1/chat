name: 📺 YouTube チャット録画 & PDFレポート生成

# ✅ 安定性向上: run-name に video_title や video_id を明示し、監視エンジンの二重起動判定精度を向上
run-name: "🎙️ 録画中: ${{ github.event.client_payload.video_title || github.event.client_payload.video_id || github.event.inputs.video_id }} — ${{ github.event.client_payload.channel_name || '手動' }}"

concurrency:
  group: record-${{ github.event.client_payload.video_id || github.event.inputs.video_id || 'manual' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube Video ID (11文字)'
        required: true
      timeout:
        description: '録画時間 (分, 最大330)'
        default: '330'
  repository_dispatch:
    types: [youtube-stream-started]

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    # GitHub Actions の上限は6時間(360分)。PDF生成・push の余裕を30分確保。
    timeout-minutes: 370
    permissions:
      contents: write

    steps:
      - name: 💬 Discord に録画開始の通知を送信
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          VIDEO_TITLE: ${{ github.event.client_payload.video_title }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Webhookが設定されていない場合はスキップ
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "Webhook is not set. Skipping."; exit 0; fi
          
          PAGES_URL="https://${REPO_NAME%%/*}.github.io/${REPO_NAME#*/}/"
          ICON_URL="${PAGES_URL}icons/icon.png"
          PAYLOAD=$(jq -n --arg username "Smart-Archiver" \
                           --arg avatar "$ICON_URL" \
                           --arg content "🔴 **録画開始**\n🎥 対象動画: **${VIDEO_TITLE:-$VIDEO_ID}** の監視と録画プロセスを開始しました！\n🔗 [アプリを開いて進捗を確認する]($PAGES_URL)" \
                           '{username: $username, avatar_url: $avatar, content: $content}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存関係をインストール
        run: npm install

      - name: 🎙️ スタンドアロン録画開始 (No-DB Mode)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # ✅ セキュリティ: 環境変数経由で渡すことでシェルインジェクションを防止
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          TIMEOUT: ${{ github.event.inputs.timeout || github.event.client_payload.timeout || '330' }}
        run: |
          echo "🎬 Starting recording: \"$VIDEO_ID\" (timeout: ${TIMEOUT}min)"
          npx ts-node src/standalone-recorder.ts --video-id="$VIDEO_ID" --timeout="$TIMEOUT"

      - name: 📂 成果物をコミットして保存
        # ✅ 最重要: if: always() により、録画が途中終了・強制終了された場合でも必ず実行する
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add public/reports/ public/sessions.json || true
          git commit -m "chore: 録画レポートを追加 (${{ github.event.inputs.video_id || github.event.client_payload.video_id }})" || echo "No changes to commit"
          git push || echo "Push failed (conflict), retrying..."
          git pull --rebase origin main && git push || true

      - name: 💬 Discord に完了通知を送信
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VIDEO_ID: ${{ github.event.inputs.video_id || github.event.client_payload.video_id }}
          REPO_NAME: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then echo "Webhook is not set. Skipping."; exit 0; fi
          PAGES_URL="https://${REPO_NAME%%/*}.github.io/${REPO_NAME#*/}/"
          ICON_URL="${PAGES_URL}icons/icon.png"
          PAYLOAD=$(jq -n --arg username "Smart-Archiver" \
                           --arg avatar "$ICON_URL" \
                           --arg content "✅ **録画完了**\n🎥 対象動画: **${VIDEO_TITLE:-$VIDEO_ID}** の録画とPDFレポート生成が完了しました！\n🔗 [ここをクリックしてレポートを確認]($PAGES_URL)" \
                           '{username: $username, avatar_url: $avatar, content: $content}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
