name: 📺 YouTube チャット録画 & PDFレポート生成

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube動画ID (例: dQw4w9WgXcQ)'
        required: true
        type: string
      timeout_minutes:
        description: '最大録画時間（分）※ライブ終了で自動停止'
        required: false
        default: '120'
        type: string

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: 📥 チェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 依存インストール
        run: |
          npm ci
          pip install chat-downloader

      - name: 🔤 日本語フォントダウンロード
        run: npx ts-node src/utils/fontDownloader.ts

      - name: 🚀 APIサーバー起動
        run: |
          npx ts-node src/app.ts &
          echo "サーバー起動中..."
          sleep 5
          curl -s http://localhost:3000/health
        env:
          MONGODB_URI: mongodb://localhost:27017/chat-archiver
          PORT: 3000

      - name: 🎙️ チャット録画開始
        run: |
          echo "🎬 録画開始: ${{ inputs.video_id }}"
          curl -s -X POST http://localhost:3000/api/record/start \
            -H "Content-Type: application/json" \
            -d '{"videoId": "${{ inputs.video_id }}"}'
        env:
          MONGODB_URI: mongodb://localhost:27017/chat-archiver

      - name: ⏳ 録画待機（配信終了 or タイムアウト）
        run: |
          MAX_WAIT=$(( ${{ inputs.timeout_minutes }} * 60 ))
          ELAPSED=0
          INTERVAL=30

          echo "⏳ 最大 ${{ inputs.timeout_minutes }}分 待機（5分無チャットで自動停止）"

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
            
            STATUS=$(curl -s http://localhost:3000/api/record/status)
            ACTIVE=$(echo "$STATUS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          sessions = data.get('sessions', [])
          active = [s for s in sessions if s['status'] == 'recording']
          print(len(active))
          " 2>/dev/null || echo "0")
            
            if [ "$ACTIVE" = "0" ]; then
              echo "✅ 録画完了（配信終了 or 5分タイムアウト）"
              break
            fi
            
            MINS=$(( ELAPSED / 60 ))
            echo "📡 録画中... (${MINS}分経過)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⏰ 最大録画時間到達 — 手動停止"
            curl -s -X POST http://localhost:3000/api/record/stop \
              -H "Content-Type: application/json" \
              -d '{"videoId": "${{ inputs.video_id }}"}'
            sleep 10
          fi

      - name: 📊 セッション確認
        run: |
          echo "📋 セッション一覧:"
          curl -s http://localhost:3000/api/sessions | python3 -m json.tool

      - name: 📄 PDFレポート生成
        run: |
          mkdir -p output
          HTTP_CODE=$(curl -s -o output/chat-report-${{ inputs.video_id }}.pdf \
            -w "%{http_code}" \
            http://localhost:3000/api/sessions/${{ inputs.video_id }}/pdf)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ PDF生成完了"
            ls -la output/
          else
            echo "⚠️ PDF生成スキップ（メッセージが0件の可能性）"
          fi

      - name: 📤 成果物アップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chat-report-${{ inputs.video_id }}
          path: output/
          retention-days: 30
