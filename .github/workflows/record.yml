name: 📺 YouTube チャット録画 & PDFレポート生成
run-name: "📺 録画: ${{ inputs.video_id }} (${{ inputs.timeout_minutes }}分)"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'YouTube動画ID (例: dQw4w9WgXcQ)'
        required: true
        type: string
      timeout_minutes:
        description: '最大録画時間（分）※GitHub Actionsの上限は360分'
        required: false
        default: '360'
        type: string

jobs:
  record-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pages: write
      id-token: write

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: 📥 チェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 依存インストール
        run: |
          npm ci

      - name: 🔤 日本語フォントダウンロード
        run: npx ts-node src/utils/fontDownloader.ts

      - name: 🚀 APIサーバー起動
        run: |
          npx ts-node src/app.ts &
          echo "サーバー起動中..."
          sleep 5
          curl -s http://localhost:3000/health
        env:
          MONGODB_URI: mongodb://localhost:27017/chat-archiver
          PORT: 3000
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: 🎙️ チャット録画開始
        run: |
          echo "🎬 録画開始: ${{ inputs.video_id }}"
          curl -s -X POST http://localhost:3000/api/record/start \
            -H "Content-Type: application/json" \
            -d '{"videoId": "${{ inputs.video_id }}"}'
        env:
          MONGODB_URI: mongodb://localhost:27017/chat-archiver

      - name: ⏳ 録画待機（配信終了 or タイムアウト）
        run: |
          MAX_WAIT=$(( ${{ inputs.timeout_minutes }} * 60 ))
          ELAPSED=0
          INTERVAL=30
          FIRST_CHECK_DONE=false

          echo "⏳ 最大 ${{ inputs.timeout_minutes }}分 待機します。"

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$(( ELAPSED + INTERVAL ))
            
            STATUS=$(curl -s http://localhost:3000/api/record/status)
            ACTIVE=$(echo "$STATUS" | node -e "
          const data = JSON.parse(require('fs').readFileSync('/dev/stdin').toString());
          const active = data.sessions ? data.sessions.filter(s => s.status === 'recording').length : 0;
          console.log(active);
          " 2>/dev/null || echo "0")
            
            if [ "$ACTIVE" != "0" ]; then
              FIRST_CHECK_DONE=true
            fi

            if [ "$ACTIVE" = "0" ]; then
              if [ "$FIRST_CHECK_DONE" = "true" ]; then
                echo "✅ 録画完了（配信終了 or 5分タイムアウト）"
                break
              else
                # まだ一度も録画開始を確認できていない場合
                if [ $ELAPSED -gt 120 ]; then
                  echo "❌ 録画が開始されませんでした（タイムアウト）"
                  exit 1
                fi
                echo "⏳ サーバー起動中につき待機しています... (${ELAPSED}秒経過)"
              fi
            else
              MINS=$(( ELAPSED / 60 ))
              echo "📡 録画中... (${MINS}分経過 / メッセージ取得中)"
            fi
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "⏰ 最大録画時間の $MAX_WAIT 秒に到達しました — 停止リクエストを送信します"
            curl -s -X POST http://localhost:3000/api/record/stop \
              -H "Content-Type: application/json" \
              -d '{"videoId": "${{ inputs.video_id }}"}'
            sleep 10
          fi

      - name: 📊 セッション確認
        run: |
          echo "📋 セッション一覧:"
          curl -s http://localhost:3000/api/sessions | node -e "console.log(JSON.stringify(JSON.parse(require('fs').readFileSync(0, 'utf-8')), null, 2))"

      - name: 📄 PDFレポート生成
        run: |
          mkdir -p output
          HTTP_CODE=$(curl -s -o output/chat-report-${{ inputs.video_id }}.pdf \
            -w "%{http_code}" \
            http://localhost:3000/api/sessions/${{ inputs.video_id }}/pdf)
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ PDF生成完了"
            mkdir -p public/reports
            cp output/chat-report-${{ inputs.video_id }}.pdf public/reports/
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add public/reports/
            git commit -m "chore: 録画レポートを追加 (${{ inputs.video_id }})" || echo "No changes to commit"
            git push origin main
          else
            echo "⚠️ PDF生成スキップ（メッセージが0件の可能性）"
          fi

      - name: 📤 成果物アップロード
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chat-report-${{ inputs.video_id }}
          path: output/
          retention-days: 30
