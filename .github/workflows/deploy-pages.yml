name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["📺 YouTube チャット録画 & PDFレポート生成"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 デバッグ：公開ファイルを確認
        run: |
          echo "📁 Public フォルダの構造:"
          ls -R public
          echo "📝 index.html のバージョン確認:"
          grep "v1.2-Fix" public/index.html || echo "❌ バージョンスタンプが見つかりません"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # publicディレクトリのみをデプロイ

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
