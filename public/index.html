<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Smart-Archiver</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 2rem;">
      <div>
        <h1><i class="fab fa-youtube" style="color: #ff0000; margin-right: 0.5rem;"></i> Smart-Archiver</h1>
        <p class="subtitle" style="margin: 0; margin-top: 5px;">高度なYouTubeライブチャット記録・分析システム</p>
      </div>
      <button id="btnOpenCloudConfig" class="btn-secondary" style="font-size: 0.9rem;" title="クラウド完全自動化モードの設定">
        <i class="fas fa-cloud"></i> クラウド設定
      </button>
    </header>

    <!-- Start Recording Form -->
    <section class="card">
      <h2><i class="fas fa-video"></i> 録画を開始する</h2>
      <form id="recordForm">
        <div class="input-group">
          <input type="text" id="videoIdInput" placeholder="YouTube Video ID (例: dQw4w9WgXcQ)" required autocomplete="off">
          <button type="submit" id="submitBtn" class="btn-primary">
            <i class="fas fa-play"></i> START
          </button>
        </div>
      </form>
    </section>

    <!-- Active Sessions -->
    <section class="card">
      <h2><i class="fas fa-satellite-dish"></i> 録画中のセッション</h2>
      <ul id="activeSessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>

    <!-- Completed Sessions -->
    <section class="card">
      <h2><i class="fas fa-archive"></i> 保存済みセッション</h2>
      <ul id="historySessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>
  </div>

  <!-- Cloud Config Modal -->
  <div id="cloudConfigModal" class="modal-overlay" style="display: none;">
    <div class="modal-content card" style="max-width: 500px; width: 90%; margin: 5rem auto; position: relative;">
      <h2><i class="fas fa-cloud"></i> クラウド自動操縦設定</h2>
      <p style="font-size: 0.9rem; color: #aaa; margin-bottom: 20px;">
        GitHubのActionsサーバーを直接操縦するための設定です。ローカルPCのターミナルに頼らず、ブラウザ画面だけで全自動クラウド録画が可能になります。<br>
        ※入力内容はご自身のブラウザ内にのみ安全に記憶されます。
      </p>

      <div class="input-group">
        <input type="text" id="ghRepo" placeholder="リポジトリ名 (例: meguru-v1/chat)" style="margin-bottom: 10px;" />
      </div>

      <div class="input-group">
        <input type="password" id="ghToken" placeholder="GitHub Token (例: ghp_... または github_pat_...)" />
      </div>

      <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
        <button id="btnCancelConfig" class="btn-secondary">キャンセル</button>
        <button id="btnSaveConfig" class="btn-primary" style="padding: 0.75rem 1.5rem;"><i class="fas fa-save"></i> 適用</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <script src="app.js?v=2.0"></script>
</body>
</html>
