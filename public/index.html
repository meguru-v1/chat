<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Smart-Archiver</title>
  <meta name="description" content="YouTube ライブチャットを自動録画し、統計付き PDF レポートを生成するツール">
  <link rel="stylesheet" href="style.css?v=3.1">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- PWA Settings -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0d18">
  <link rel="apple-touch-icon" href="icons/icon.png">
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
</head>
<body>
  
  <div class="container">
    <header class="site-header">
      <div>
        <h1><i class="fab fa-youtube" style="color:#ff2b2b;margin-right:0.4rem;"></i>Smart-Archiver</h1>
        <p class="subtitle">
          YouTube ライブチャット自動録画 ＆ 統計レポート
          <span class="version-tag">v3.1</span>
        </p>
      </div>
    </header>

    <!-- API Rate Limit Warning -->
    <div id="rateLimitBanner" style="display:none;" class="card" role="alert">
      <p style="margin:0; color: #f59e0b; font-size: 0.9rem;">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="rateLimitMessage">GitHub API 制限中です。しばらくお待ちください。</span>
      </p>
    </div>

    <!-- Start Recording Form -->
    <section class="card">
      <h2><i class="fas fa-plus-circle"></i> 今すぐ録画を開始</h2>
      <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 1rem;">YouTube の URL または Video ID を入力してください</p>
      <form id="recordForm">
        <div class="input-group">
          <input type="text" id="videoIdInput" placeholder="YouTube URL or Video ID (例: dQw4w9WgXcQ)" required autocomplete="off">
          <button type="submit" id="submitBtn" class="btn-primary">
            <i class="fas fa-play"></i> 録画リクエスト
          </button>
        </div>
      </form>
    </section>

    <!-- Active Sessions -->
    <section class="card">
      <h2><i class="fas fa-spinner fa-spin"></i> 実行中のタスク</h2>
      <ul id="activeSessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>

    <!-- Completed Sessions -->
    <section class="card">
      <h2><i class="fas fa-history"></i> 最近の完了レポート</h2>
      <ul id="historySessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>

    <!-- ④ Channel Management -->
    <section class="card">
      <h2><i class="fas fa-satellite-dish"></i> 監視チャンネル管理</h2>
      <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 1rem;">自動監視するチャンネルを管理します（10分ごとに巡回）</p>
      
      <ul id="channelList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>

      <div style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
        <h3 style="font-size: 0.95rem; margin-bottom: 0.5rem;"><i class="fas fa-plus"></i> チャンネルを追加</h3>
        <form id="addChannelForm">
          <div class="input-group" style="margin-bottom: 0.5rem;">
            <input type="text" id="channelUrlInput" placeholder="チャンネル URL (例: https://www.youtube.com/@channelname)" required autocomplete="off">
            <button type="submit" id="addChannelBtn" class="btn-primary">
              <i class="fas fa-plus"></i> 追加
            </button>
          </div>
        </form>
      </div>
    </section>

  </div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <script src="app.js?v=3.0"></script>
</body>
</html>
