<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Smart-Archiver</title>
  <link rel="stylesheet" href="style.css?v=2.0">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div class="container">
    <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 2rem;">
      <div>
        <h1><i class="fab fa-youtube" style="color: #ff0000; margin-right: 0.5rem;"></i> Smart-Archiver</h1>
        <p class="subtitle" style="margin: 0; margin-top: 5px;">
          最新の YouTube ライブチャット自動録画 ＆ レポート 📊
          <span style="font-size: 0.7rem; color: #00ff88; background: rgba(0,255,136,0.1); padding: 2px 6px; border-radius: 4px; margin-left: 8px;">No Token Mode v2.1</span>
        </p>
      </div>
    </header>

    <!-- Start Recording Form -->
    <section class="card">
      <h2><i class="fas fa-plus-circle"></i> 今すぐ録画を開始</h2>
      <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 1rem;">Video ID を入力して中継サーバー経由で GitHub Actions を起動します（トークン設定不要）</p>
      <form id="recordForm">
        <div class="input-group">
          <input type="text" id="videoIdInput" placeholder="YouTube Video ID (例: dQw4w9WgXcQ)" required autocomplete="off">
          <button type="submit" id="submitBtn" class="btn-primary">
            <i class="fas fa-play"></i> 録画リクエスト
          </button>
        </div>
      </form>
    </section>

    <!-- Active Sessions -->
    <section class="card">
      <h2><i class="fas fa-spinner fa-spin"></i> 実行中のタスク</h2>
      <ul id="activeSessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>

    <!-- Completed Sessions -->
    <section class="card">
      <h2><i class="fas fa-history"></i> 最近の完了レポート</h2>
      <ul id="historySessionsList" class="session-list">
        <li class="empty-state">読み込み中...</li>
      </ul>
    </section>

  </div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <script src="app.js?v=2.0"></script>
</body>
</html>
